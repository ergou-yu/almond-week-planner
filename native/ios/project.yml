name: AlmondWeekPlanner
options:
  bundleIdPrefix: app.almondweek
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  AlmondWeekPlanner:
    type: application
    platform: iOS
    sources:
      - AlmondWeekPlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.almondweek.planner.ios
        PRODUCT_NAME: "杏花周计划"
        INFOPLIST_FILE: AlmondWeekPlanner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_STYLE: Automatic
